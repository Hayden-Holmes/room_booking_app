<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Reservations</title>
    <meta charset="UTF-8">
</head>
<body>
    <div th:replace="~{navbar :: navbar}"></div>
    

    <h2>My Reservations</h2>

    <!-- Flash Messages -->
    <div th:if="${cancelSuccess}">
        <p style="color: green;" th:text="${cancelSuccess}"></p>
    </div>

    <div th:if="${cancelError}">
        <p style="color: red;" th:text="${cancelError}"></p>
    </div>

    <!-- No Reservations -->
    <div th:if="${#lists.isEmpty(reservations)}">
        <p>No reservations found.</p>
    </div>

    <!-- Reservations Table -->
    <table th:if="${!#lists.isEmpty(reservations)}" border="1">
        <thead>
            <tr>
                <th>Room</th>
                <th>Start</th>
                <th>End</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="r : ${reservations}">
                <td th:text="${r.room.name}">Room Name</td>
                <td th:text="${#temporals.format(r.startTime, 'yyyy-MM-dd HH:mm')}">Start</td>
                <td th:text="${#temporals.format(r.endTime, 'yyyy-MM-dd HH:mm')}">End</td>
                <td th:text="${r.status}">Status</td>
                <td>
                    <!-- Show Cancel only if BOOKED -->
                    <form th:if="${r.status.name() == 'BOOKED'}"
                        th:action="@{|/reservations/${r.id}/cancel|}"
                        method="post">
                        
                        <!-- CSRF token required -->
                        <input type="hidden"
                            th:name="${_csrf.parameterName}"
                            th:value="${_csrf.token}" />

                        <button type="submit">Cancel</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <br>
    <a href="/search">Back to Search</a>

</body>
</html>
